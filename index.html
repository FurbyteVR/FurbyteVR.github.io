<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⊹ Choose Your Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Raleway:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0e0d12; font-family: 'Nunito', sans-serif; overflow: hidden; position: relative; }
        .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .ambient-byte { position: absolute; width: 420px; height: 420px; left: -60px; top: 50%; transform: translateY(-50%); background: radial-gradient(circle, rgba(199,116,232,0.12) 0%, transparent 70%); animation: ambientPulse 6s ease-in-out infinite alternate; }
        .ambient-squeakers { position: absolute; width: 420px; height: 420px; left: 50%; top: 50%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(120,200,255,0.09) 0%, transparent 70%); animation: ambientPulseCenter 6s ease-in-out 2s infinite alternate; }
        .ambient-fox { position: absolute; width: 420px; height: 420px; right: -60px; top: 50%; transform: translateY(-50%); background: radial-gradient(circle, rgba(255,140,66,0.12) 0%, transparent 70%); animation: ambientPulse 6s ease-in-out 4s infinite alternate; }
        @keyframes ambientPulse { 0% { opacity:0.5; transform:translateY(-50%) scale(1); } 100% { opacity:1; transform:translateY(-50%) scale(1.15); } }
        @keyframes ambientPulseCenter { 0% { opacity:0.5; transform:translate(-50%,-50%) scale(1); } 100% { opacity:1; transform:translate(-50%,-50%) scale(1.15); } }
        .page-label { position: relative; z-index: 10; color: rgba(255,255,255,0.18); font-size: 0.62rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 2rem; font-family: 'Raleway', sans-serif; animation: fadeIn 0.5s ease both; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .cards-wrapper { display: flex; align-items: stretch; justify-content: center; gap: 20px; position: relative; z-index: 10; width: min(1020px, 96vw); }
        .profile-card { flex: 1; max-width: 300px; display: flex; flex-direction: column; align-items: center; padding: 2.2rem 1.6rem 1.8rem; text-decoration: none; border-radius: 28px; transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.4s ease; position: relative; overflow: hidden; cursor: pointer; gap: 12px; animation: cardIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both; }
        .byte-card      { background: rgba(55,42,66,0.48);  border: 1px solid rgba(199,116,232,0.18); animation-delay: 0.08s; }
        .squeakers-card { background: rgba(20,40,68,0.52);  border: 1px solid rgba(120,200,255,0.18); animation-delay: 0.18s; }
        .fox-card       { background: rgba(60,25,10,0.5);   border: 1px solid rgba(255,140,66,0.18);  animation-delay: 0.28s; }
        .byte-card:hover      { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 55px rgba(199,116,232,0.22), 0 0 0 1px rgba(199,116,232,0.45); }
        .squeakers-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 55px rgba(120,200,255,0.18), 0 0 0 1px rgba(120,200,255,0.4);  }
        .fox-card:hover       { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 55px rgba(255,140,66,0.2),  0 0 0 1px rgba(255,140,66,0.45);  }
        @keyframes cardIn { from { opacity:0; transform:translateY(28px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        .avatar-ring { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
        .byte-ring      { background: rgba(199,116,232,0.12); border: 2px solid rgba(199,116,232,0.32); box-shadow: 0 0 28px rgba(199,116,232,0.18); }
        .squeakers-ring { background: rgba(120,200,255,0.1);  border: 2px solid rgba(120,200,255,0.28); box-shadow: 0 0 28px rgba(120,200,255,0.14); }
        .fox-ring       { background: rgba(255,140,66,0.1);   border: 2px solid rgba(255,140,66,0.3);   box-shadow: 0 0 28px rgba(255,140,66,0.16); }
        .avatar-letter { font-family: 'Raleway', sans-serif; font-weight: 900; font-size: 2.1rem; letter-spacing: -1px; }
        .byte-card .avatar-letter      { color: #C774E8; }
        .squeakers-card .avatar-letter { color: #78C8FF; }
        .fox-card .avatar-letter       { color: #FF8C42; }
        .card-name { font-family: 'Raleway', sans-serif; font-size: 1.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .byte-card .card-name      { color: #F2E8D2; }
        .squeakers-card .card-name { color: #E8F4FF; }
        .fox-card .card-name       { color: #FFE8CC; }
        .card-pronouns { font-size: 0.67rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        .byte-card .card-pronouns      { color: #C774E8; }
        .squeakers-card .card-pronouns { color: #78C8FF; }
        .fox-card .card-pronouns       { color: #FF8C42; }
        .card-bio { font-size: 0.82rem; text-align: center; line-height: 1.65; max-width: 190px; }
        .byte-card .card-bio      { color: #A59EAD; }
        .squeakers-card .card-bio { color: #7AAFC8; }
        .fox-card .card-bio       { color: #B8825A; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 2px; }
        .tag { padding: 3px 11px; border-radius: 50px; font-size: 0.67rem; font-weight: 700; }
        .byte-card .tag      { background: rgba(199,116,232,0.1);  color: #C774E8; border: 1px solid rgba(199,116,232,0.22); }
        .squeakers-card .tag { background: rgba(120,200,255,0.08); color: #78C8FF; border: 1px solid rgba(120,200,255,0.2);  }
        .fox-card .tag       { background: rgba(255,140,66,0.1);   color: #FF8C42; border: 1px solid rgba(255,140,66,0.22);  }
        .enter-btn { margin-top: auto; padding: 10px 24px; border-radius: 50px; font-size: 0.72rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; transition: 0.25s; font-family: 'Raleway', sans-serif; }
        .byte-card .enter-btn      { background: rgba(199,116,232,0.14); color: #C774E8; border: 1px solid rgba(199,116,232,0.38); }
        .squeakers-card .enter-btn { background: rgba(120,200,255,0.1);  color: #78C8FF; border: 1px solid rgba(120,200,255,0.32); }
        .fox-card .enter-btn       { background: rgba(255,140,66,0.12);  color: #FF8C42; border: 1px solid rgba(255,140,66,0.35); }
        .byte-card:hover .enter-btn      { background: rgba(199,116,232,0.28); }
        .squeakers-card:hover .enter-btn { background: rgba(120,200,255,0.24); }
        .fox-card:hover .enter-btn       { background: rgba(255,140,66,0.26);  }
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .particle  { position: absolute; border-radius: 50%; animation: floatUp linear infinite; }
        .flake     { position: absolute; color: rgba(180,230,255,0.22); font-size: 10px; animation: snowFall linear infinite; }
        .ember     { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255,150,60,0.65) 0%, transparent 70%); animation: floatUp linear infinite; }
        @keyframes floatUp  { 0% { transform:translateY(110vh); opacity:0; } 5% { opacity:1; } 95% { opacity:1; } 100% { transform:translateY(-10vh); opacity:0; } }
        @keyframes snowFall { 0% { transform:translateY(-15px); opacity:0; } 10% { opacity:1; } 90% { opacity:0.5; } 100% { transform:translateY(105vh); opacity:0; } }
        @media (max-width: 720px) { .cards-wrapper { flex-direction: column; align-items: center; gap: 1rem; } .profile-card { max-width: 340px; width: 100%; } body { overflow-y: auto; padding: 2.5rem 0; justify-content: flex-start; } }
    </style>
</head>
<body>
    <div class="ambient">
        <div class="ambient-byte"></div>
        <div class="ambient-squeakers"></div>
        <div class="ambient-fox"></div>
    </div>
    <div class="particles" id="particles"></div>

    <p class="page-label">⊹ choose your vibe ⊹</p>

    <div class="cards-wrapper">
        <a class="profile-card byte-card" href="./byte.html">
            <div class="avatar-ring byte-ring"><span class="avatar-letter">B</span></div>
            <div class="card-name">Byte</div>
            <div class="card-pronouns">He / Him &nbsp;⊹&nbsp; GMT+1</div>
            <div class="card-bio">Quiet & cozy.<br>Staying in my own little bubble.</div>
            <div class="card-tags"><span class="tag">Netherlands</span><span class="tag">Furry</span></div>
            <button class="enter-btn">Enter ↗</button>
        </a>

        <a class="profile-card squeakers-card" href="./squeakers.html">
            <div class="avatar-ring squeakers-ring"><span class="avatar-letter">S</span></div>
            <div class="card-name">Squeakers</div>
            <div class="card-pronouns">He / Him &nbsp;❄&nbsp; Texas</div>
            <div class="card-bio">Shy but friendly.<br>Single pringle. Ask me anything.</div>
            <div class="card-tags"><span class="tag">Texas</span><span class="tag">26</span></div>
            <button class="enter-btn">Enter ↗</button>
        </a>

        <a class="profile-card fox-card" href="./justthefox.html">
            <div class="avatar-ring fox-ring"><span class="avatar-letter">F</span></div>
            <div class="card-name">Fox</div>
            <div class="card-pronouns">He / Him &nbsp;🦊&nbsp; Poland</div>
            <div class="card-bio">20 · DMs open.<br>Living that fox life.</div>
            <div class="card-tags"><span class="tag">Poland</span><span class="tag">VRChat</span></div>
            <button class="enter-btn">Enter ↗</button>
        </a>
    </div>

    <script>
        const p = document.getElementById('particles');
        for (let i = 0; i < 6; i++) {
            const el = document.createElement('div'); el.className = 'particle';
            const size = Math.random()*40+12;
            el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*28}%;background:rgba(199,116,232,${(Math.random()*0.05+0.02).toFixed(3)});border:1px solid rgba(199,116,232,0.07);animation-duration:${Math.random()*16+12}s;animation-delay:${Math.random()*14}s;`;
            p.appendChild(el);
        }
        for (let i = 0; i < 10; i++) {
            const el = document.createElement('div'); el.className = 'flake'; el.textContent = '❄';
            el.style.cssText = `left:${35+Math.random()*30}%;font-size:${Math.random()*7+6}px;animation-duration:${Math.random()*9+7}s;animation-delay:${Math.random()*12}s;`;
            p.appendChild(el);
        }
        for (let i = 0; i < 8; i++) {
            const el = document.createElement('div'); el.className = 'ember';
            const size = Math.random()*5+2;
            el.style.cssText = `width:${size}px;height:${size}px;left:${68+Math.random()*30}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*14}s;opacity:${Math.random()*0.5+0.2};`;
            p.appendChild(el);
        }
    </script>
</body>
</html>
